<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Andy</title>
<style>
body {
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.card {
    background: white;
    padding: 30px;
    max-width: 500px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
    animation: fadeIn 2s ease-in-out;
}
h1 {
    color: #ff4b5c;
    font-size: 32px;
}
p {
    color: #444;
    font-size: 18px;
    line-height: 1.6;
}
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>
<body>

<div class="card">
    <h1>Happy Birthday, Andy 🎂</h1>
    <p>
        Wishing you happiness, peace, and a relationship filled with love, trust, and understanding.  
        May you and the person you truly love find the bond you both deserve.  
        Stay blessed and take care always.
    </p>
</div>

</body>
</html>
